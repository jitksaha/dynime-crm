<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 32 32">
  <defs>
    <style>
      .cls-1 { fill: #444; }
      .cls-2 { fill: #7f7f7f; }
    </style>
    <mask id="pieMask">
      <!-- White = show, Black = cut (gap lines) -->
      <rect width="32" height="32" fill="white"/>
      <!-- Gap line 1: center to top -->
      <line x1="16" y1="16" x2="16" y2="0" stroke="black" stroke-width="2" stroke-linecap="round"/>
      <!-- Gap line 2: center to lower-right -->
      <line x1="16" y1="16" x2="30.7224" y2="24.5" stroke="black" stroke-width="2" stroke-linecap="round"/>
      <!-- Gap line 3: center to lower-left -->
      <line x1="16" y1="16" x2="1.2776" y2="24.5" stroke="black" stroke-width="2" stroke-linecap="round"/>
    </mask>
  </defs>
  <g mask="url(#pieMask)">
    <!-- Slice 1: top → lower-right, #444 -->
    <path class="cls-1" d="M16,16 L16,1 A15,15 0 0,1 28.9904,23.5 Z"/>
    <!-- Slice 2: lower-right → lower-left, #7f7f7f -->
    <path class="cls-2" d="M16,16 L28.9904,23.5 A15,15 0 0,1 3.0096,23.5 Z"/>
    <!-- Slice 3: lower-left → top, #444 -->
    <path class="cls-1" d="M16,16 L3.0096,23.5 A15,15 0 0,1 16,1 Z"/>
  </g>
</svg>
